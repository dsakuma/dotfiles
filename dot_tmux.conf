# ==============================================================================
# 1. SERVER & SYSTEM SETTINGS
# ==============================================================================

# Fix colors so tools like Vim/Neovim render correctly inside tmux
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Increase scrollback lines memory
set -g history-limit 10000

# Enable mouse support (clicking, scrolling, resizing)
set -g mouse on


# ==============================================================================
# 2. WINDOWS & PANES MANAGEMENT
# ==============================================================================

# Create new windows and panels in the current working path
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Prevent automatic window renaming based on the active process
set-option -g allow-rename off  

# Renumber windows sequentially after closing any of them
set -g renumber-windows on


# ==============================================================================
# 3. VIM NAVIGATION & INTERACTION
# ==============================================================================

# Act like vim in copy/scroll mode
setw -g mode-keys vi

# Switch panes using Alt + h/j/k/l WITHOUT pressing the prefix first
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R


# ==============================================================================
# 4. UI & NOTIFICATIONS
# ==============================================================================

# Soften status bar color from harsh green to a neutral gray
set -g status-style bg='#666666',fg='#aaaaaa'

# Enable visual activity alerts in the status bar
set -g monitor-activity on


# ==============================================================================
# 5. UTILITY BINDS
# ==============================================================================

# Fast reload of this configuration file using Prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"